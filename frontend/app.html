<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B3A2D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="食术·中医体质养生 - AI中医体质辨识，个性化健康管理平台">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/styles.css">
  <title>食术·体质养生</title>
  <style>
    body { margin: 0; font-family: -apple-system, 'Noto Sans SC', 'PingFang SC', sans-serif; background: #f5f5f5; padding-bottom: 60px; }
    .app-shell { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; text-align: center; }
    .app-shell .logo { font-size: 48px; margin-bottom: 16px; }
    .app-shell h1 { font-size: 22px; color: #1B3A2D; margin: 0 0 8px; }
    .app-shell p { font-size: 14px; color: #666; margin: 0 0 24px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E8F5E9; border-top-color: #4CAF50; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* 底部导航栏 */
    .bottom-tab { position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: #fff; border-top: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: space-around; z-index: 999; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); }
    .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; height: 100%; color: #999; font-size: 11px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color .2s; }
    .tab-item i { font-size: 20px; margin-bottom: 2px; }
    .tab-item.active { color: #1B5E2D; }
    .tab-item:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="app-container" id="app">
    <div class="logo">🌿</div>
    <h1>食术·体质养生</h1>
    <p>加载中...</p>
    <div class="spinner"></div>
  </div>
  <!-- 底部导航栏 -->
  <div class="bottom-tab" id="bottom-tab">
    <div class="tab-item active" data-page="home" onclick="navigate('home')">
      <i class="fa-solid fa-house"></i>
      <span>首页</span>
    </div>
    <div class="tab-item" data-page="recipes" onclick="navigate('recipes')">
      <i class="fa-solid fa-utensils"></i>
      <span>食疗</span>
    </div>
    <div class="tab-item" data-page="tea" onclick="navigate('tea')">
      <i class="fa-solid fa-mug-hot"></i>
      <span>茶饮</span>
    </div>
    <div class="tab-item" data-page="shop" onclick="navigate('shop')">
      <i class="fa-solid fa-cart-shopping"></i>
      <span>商城</span>
    </div>
    <div class="tab-item" data-page="profile" onclick="navigate('profile')">
      <i class="fa-solid fa-user"></i>
      <span>我的</span>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
    // 定时更新底部导航栏高亮（兼容方案）
    setInterval(function() {
      if (typeof updateTabBar === 'function') updateTabBar();
    }, 800);
    // 页面加载后初始化
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if (typeof updateTabBar === 'function') updateTabBar();
      }, 1200);
    });
  </script>
</body>
</html>
