<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B3A2D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="食术·中医体质养生 - AI中医体质辨识，个性化健康管理平台">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/styles.css">
  <title>食术·体质养生</title>
  <style>
    body { margin: 0; font-family: -apple-system, 'Noto Sans SC', 'PingFang SC', sans-serif; background: #f5f5f5; }
    .app-shell { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; text-align: center; }
    .app-shell .logo { font-size: 48px; margin-bottom: 16px; }
    .app-shell h1 { font-size: 22px; color: #1B3A2D; margin: 0 0 8px; }
    .app-shell p { font-size: 14px; color: #666; margin: 0 0 24px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E8F5E9; border-top-color: #4CAF50; border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app-shell" id="app-shell">
    <div class="logo">🌿</div>
    <h1>食术·体质养生</h1>
    <p>加载中...</p>
    <div class="spinner"></div>
  </div>
  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
