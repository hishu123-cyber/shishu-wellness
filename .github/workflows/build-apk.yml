name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup tools
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Generate PWA icons
        run: |
          mkdir -p /tmp/pwa-icons
          python3 scripts/make_icons.py /tmp/pwa-icons/icon-512.png /tmp/pwa-icons/icon-192.png
          ls -la /tmp/pwa-icons/
      - name: Setup PWA
        run: |
          mkdir -p /tmp/pwa-build
          cp -r frontend/* /tmp/pwa-build/
          cp /tmp/pwa-icons/* /tmp/pwa-build/
          cd /tmp/pwa-build
          python3 -m http.server 9999 &
          sleep 2
          npx @bubblewrap/cli init --manifest=http://127.0.0.1:9999/manifest.json --directory=/tmp/app-output 2>&1 || true
          kill %1 2>/dev/null || true
      - name: Build APK
        run: |
          if [ -f /tmp/app-output/gradlew ]; then
            cd /tmp/app-output
            chmod +x gradlew
            ./gradlew assembleRelease 2>&1 || true
          fi
          find /tmp -name '*.apk' -type f 2>/dev/null || echo "No APK found"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wellness-app-apk
          path: /tmp/**/*.apk
          if-no-files-found: warn
