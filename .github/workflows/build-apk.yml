name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli
      - name: Generate icons
        run: |
          mkdir -p /tmp/pwa-icons
          python3 <<PYEOF
import struct, zlib
def png(sz, name):
    raw = b''
    for y in range(sz):
        raw += b'\x00'
        for x in range(sz):
            raw += b'\x1b\x3a\x2d\xff'
    def ck(tag, data):
        c = struct.pack('>I', len(data)) + tag + data
        crc = zlib.crc32(c[4:]) & 0xffffffff
        return c + struct.pack('>I', crc)
    ihdr = struct.pack('>IIBBBBB', sz, sz, 8, 6, 0, 0, 0)
    idat = zlib.compress(raw)
    png = b'\x89PNG\r\n\x1a\n' + ck(b'IHDR', ihdr) + ck(b'IDAT', idat) + ck(b'IEND', b'')
    open(name, 'wb').write(png)
png(512, '/tmp/pwa-icons/icon-512.png')
png(192, '/tmp/pwa-icons/icon-192.png')
PYEOF
          echo 'Icons generated'
      - name: Setup PWA files
        run: |
          mkdir -p /tmp/pwa-build
          cp -r frontend/* /tmp/pwa-build/
          cp /tmp/pwa-icons/* /tmp/pwa-build/
      - name: Bubblewrap init
        run: |
          cd /tmp/pwa-build
          python3 -m http.server 9999 &
          sleep 2
          npx @bubblewrap/cli init \
            --manifest=http://127.0.0.1:9999/manifest.json \
            --directory=/tmp/app-output \
            --jvm=/usr/lib/jvm/temurin-17-jdk-amd64/bin/java \
            --androidSdkPath=$ANDROID_HOME \
            --signingMode=none \
            2>&1 || echo 'Bubblewrap init had issues (may still work)'
          kill %1 2>/dev/null || true
      - name: Build APK
        run: |
          if [ -f /tmp/app-output/gradlew ]; then
            cd /tmp/app-output
            chmod +x gradlew
            ./gradlew assembleRelease 2>&1 || true
            find . -name '*.apk' -type f 2>/dev/null
          else
            echo 'No gradlew found - trying bubblewrap build'
            cd /tmp/app-output
            npx @bubblewrap/cli build 2>&1 || true
          fi
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wellness-app-apk
          path: |
            /tmp/app-output/**/*.apk
            /tmp/app-output/app-release.apk
            /tmp/app-output/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30
