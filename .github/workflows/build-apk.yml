name: Build Android APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate signing key and download web manifest
        run: |
          set -euxo pipefail
          mkdir -p /tmp/twa/project /tmp/twa/manifest
          keytool -genkeypair -v -keystore /tmp/twa/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Shishu,O=Shishu Wellness,L=Beijing,ST=Beijing,C=CN"
          echo "=== SHA256 Fingerprint ==="
          keytool -list -v -keystore /tmp/twa/keystore.jks -alias key0 -storepass android 2>&1 | grep SHA256
          # Download the web manifest from the live site
          curl -sL -o /tmp/twa/manifest/manifest.json "https://shishu.xn--fiqs8s/manifest.json"
          cat /tmp/twa/manifest/manifest.json

      - name: Init Bubblewrap TWA project
        run: |
          set -euxo pipefail
          cd /tmp/twa
          # Ensure ANDROID_HOME is set
          echo "ANDROID_HOME=$ANDROID_HOME"
          # Bubblewrap expects these paths
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          bubblewrap init \
            --manifest=/tmp/twa/manifest/manifest.json \
            --directory=/tmp/twa/project \
            --setVersionName=1.0.0 \
            --setVersionCode=1

      - name: Build APK with Bubblewrap
        run: |
          set -euxo pipefail
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          cd /tmp/twa/project
          bubblewrap build \
            --keystorePath=/tmp/twa/keystore.jks \
            --keystorePassword=android \
            --keyAlias=key0 \
            --keyPassword=android 2>&1

      - name: Locate APK
        if: always()
        run: |
          find /tmp/twa/project -name "*.apk" -type f 2>/dev/null
          find /tmp/twa/project -name "*.aab" -type f 2>/dev/null
          ls -laR /tmp/twa/project/ 2>/dev/null | head -50
          echo "---"
          ls -laR /tmp/twa/app/ 2>/dev/null | head -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: |
            /tmp/twa/**/*.apk
            /tmp/twa/project/**/*.apk
            /tmp/twa-project/**/*.apk
          if-no-files-found: warn
