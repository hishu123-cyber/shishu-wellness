name: Build Android APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate signing key
        run: |
          keytool -genkeypair -v \
            -keystore /tmp/keystore.jks \
            -alias key0 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Shishu, OU=Dev, O=Shishu Wellness, L=Beijing, ST=Beijing, C=CN"

      - name: Print SHA256 fingerprint
        run: |
          echo "=== SHA256 Certificate Fingerprint ==="
          keytool -list -v -keystore /tmp/keystore.jks -alias key0 -storepass android 2>&1 | grep -i 'SHA256' || true
          echo "=== Copy this fingerprint to server.js assetlinks.json ==="

      - name: Build TWA APK
        run: |
          P=/tmp/twa-project
          mkdir -p $P/app/src/main/java/com/shishu/wellness
          mkdir -p $P/app/src/main/res/{values,mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          mkdir -p $P/gradle/wrapper

          # Generate icons with Python PIL
          pip3 install Pillow 2>/dev/null || true
          python3 -c "
          try:
            from PIL import Image, ImageDraw, ImageFont
            sizes = {'xxxhdpi': 512, 'xxhdpi': 192, 'xhdpi': 144, 'hdpi': 96, 'mdpi': 48}
            for density, size in sizes.items():
                img = Image.new('RGBA', (size, size), (27, 58, 45, 255))
                d = ImageDraw.Draw(img)
                try:
                    f = ImageFont.truetype('/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc', size//3)
                except:
                    try:
                        f = ImageFont.truetype('/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc', size//3)
                    except:
                        f = ImageFont.load_default()
                text = '食'
                bbox = d.textbbox((0,0), text, font=f)
                w = bbox[2]-bbox[0]; h = bbox[3]-bbox[1]
                d.text(((size-w)//2, (size-h)//2 - bbox[1]), text, fill='white', font=f)
                path = f'$P/app/src/main/res/mipmap-{density}/ic_launcher.png'
                img.save(path)
                print(f'Created {path} ({size}x{size})')
          except Exception as e:
            print(f'PIL error: {e}, creating placeholder icons')
            import subprocess
            for density, size in {'xxxhdpi':512,'xxhdpi':192,'xhdpi':144,'hdpi':96,'mdpi':48}.items():
                subprocess.run(['convert','-size',f'{size}x{size}','xc:#1B3A2D','-gravity','center',
                    '-fill','white','-pointsize',str(size//3),'-annotate','0','S',
                    f'$P/app/src/main/res/mipmap-{density}/ic_launcher.png'], capture_output=True)
          " || true
          ls -la $P/app/src/main/res/mipmap-*/ic_launcher.png || echo "Icon generation may have failed"

          # build.gradle (project)
          cat > $P/build.gradle << 'GRADLE'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          # build.gradle (app)
          cat > $P/app/build.gradle << 'GRADLE'
          android {
            namespace 'com.shishu.wellness'
            compileSdk 34
            defaultConfig {
              applicationId "com.shishu.wellness"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0.0"
            }
            signingConfigs {
              release {
                storeFile file('/tmp/keystore.jks')
                storePassword 'android'
                keyAlias 'key0'
                keyPassword 'android'
              }
            }
            buildTypes {
              release { signingConfig signingConfigs.release; minifyEnabled true }
            }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          # AndroidManifest.xml
          cat > $P/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
              android:allowBackup="true"
              android:icon="@mipmap/ic_launcher"
              android:label="食术养生"
              android:supportsRtl="true"
              android:theme="@style/Theme.TWA">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:label="食术养生"
                android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://shishu.xn--fiqs8s/app" />
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:resource="@color/colorPrimary" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:scheme="https" android:host="shishu.xn--fiqs8s" />
                </intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE" />
                  <category android:name="android.intent.category.DEFAULT" />
                </intent-filter>
              </service>
              <meta-data android:name="asset_statements" android:resource="@string/asset_statements" />
            </application>
          </manifest>
          XML

          # Resource files
          cat > $P/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">食术养生</string>
            <string name="asset_statements">[{\&quot;relation\&quot;: [\&quot;delegate_permission/common.handle_all_urls\&quot;], \&quot;target\&quot;: {\&quot;namespace\&quot;: \&quot;web\&quot;, \&quot;site\&quot;: \&quot;https://shishu.xn--fiqs8s\&quot;}}]</string>
          </resources>
          XML

          cat > $P/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#1B3A2D</color>
            <color name="colorPrimaryDark">#1B3A2D</color>
            <color name="colorAccent">#4CAF50</color>
          </resources>
          XML

          cat > $P/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.TWA" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
            </style>
          </resources>
          XML

          echo 'include ":app"' > $P/settings.gradle
          echo -e 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m' > $P/gradle.properties

          # Build
          cd $P
          gradle wrapper --gradle-version 8.0 2>&1
          chmod +x gradlew
          ./gradlew assembleRelease 2>&1
          echo "=== APK files ==="
          find . -name '*.apk' -type f 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: /tmp/twa-project/app/build/outputs/apk/release/
          if-no-files-found: error
