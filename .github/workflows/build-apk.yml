name: Build Android APK (TWA via PWABuilder)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate signing key
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq default-jdk 2>/dev/null || true
          mkdir -p /tmp/twa-build
          keytool -genkeypair -v \
            -keystore /tmp/twa-build/keystore.jks \
            -alias key0 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Shishu, OU=Dev, O=Shishu Wellness, L=Beijing, ST=Beijing, C=CN" 2>&1 || { echo "keytool failed, trying alternative"; exit 1; }
          echo "=== SHA256 Certificate Fingerprint (for assetlinks.json) ==="
          keytool -list -v -keystore /tmp/twa-build/keystore.jks -alias key0 -storepass android 2>&1 | grep SHA256 || true

      - name: Build TWA APK using Bubblewrap
        run: |
          npm install -g @nickvdp/nickvdp 2>/dev/null || true
          npm install -g bubblewrap 2>/dev/null || true
          
          # Start local server to serve the PWA manifest
          cd $GITHUB_WORKSPACE
          node -e "
          const http = require('http');
          const fs = require('fs');
          const path = require('path');
          const dir = path.join(__dirname, 'frontend');
          http.createServer((req, res) => {
            let fp = path.join(dir, req.url === '/' ? 'index.html' : req.url);
            if (!fs.existsSync(fp)) { res.writeHead(404); res.end('Not found: ' + req.url); return; }
            res.writeHead(200, {'Access-Control-Allow-Origin':'*','Content-Type':'text/html'});
            fs.createReadStream(fp).pipe(res);
          }).listen(9999);
          console.log('Server running on :9999');
          " &
          sleep 2
          
          # Test server
          curl -s http://localhost:9999/manifest.json | head -5
          
          # Use Bubblewrap to generate TWA project
          T=/tmp/twa-build/project
          mkdir -p $T
          
          # Run bubblewrap init with defaults
          cd $T
          echo "Running bubblewrap init..."
          yes '' | bubblewrap init --manifest=http://localhost:9999/manifest.json 2>&1 || echo "bubblewrap init failed, will try manual build"
          
          # If bubblewrap generated a project, build it
          if [ -f $T/gradlew ]; then
            echo "Bubblewrap project found, building..."
            chmod +x $T/gradlew
            $T/gradlew assembleRelease --no-daemon 2>&1 || echo "Gradle build failed"
          else
            echo "No Bubblewrap project, building manually..."
          fi
          
          find /tmp -name '*.apk' -type f 2>/dev/null | head -5

      - name: Build TWA APK manually (fallback)
        if: always()
        run: |
          # Skip if APK already exists
          if find /tmp -name '*.apk' -type f 2>/dev/null | grep -q apk; then
            echo "APK already exists from Bubblewrap build"
            exit 0
          fi
          
          echo "Building TWA APK manually with Gradle..."
          
          # Install Java and Android SDK
          sudo apt-get update -qq
          sudo apt-get install -y -qq default-jdk wget unzip 2>/dev/null
          
          # Install Android SDK
          ANDROID_SDK_ROOT=/tmp/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools/
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest 2>/dev/null || true
          
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
          
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -3
          
          # Create TWA project
          P=/tmp/manual-twa
          mkdir -p $P/app/src/main/java
          mkdir -p $P/app/src/main/res/{values,mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          
          # Generate icons
          pip3 install Pillow -q
          python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          import os
          sizes = {'xxxhdpi': 512, 'xxhdpi': 192, 'xhdpi': 144, 'hdpi': 96, 'mdpi': 48}
          base = '$P/app/src/main/res'
          for density, size in sizes.items():
              img = Image.new('RGBA', (size, size), (27, 58, 45, 255))
              d = ImageDraw.Draw(img)
              try:
                  f = ImageFont.truetype('/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc', size//3)
              except:
                  f = ImageFont.load_default(size=size//3)
              text = 'S'
              bbox = d.textbbox((0,0), text, font=f)
              w, h = bbox[2]-bbox[0], bbox[3]-bbox[1]
              d.text(((size-w)//2, (size-h)//2 - bbox[1]), text, fill='white', font=f)
              img.save(f'{base}/mipmap-{density}/ic_launcher.png')
          " || echo "Icon generation failed"
          
          # Copy keystore
          cp /tmp/twa-build/keystore.jks $P/app/keystore.jks
          
          # AndroidManifest.xml
          cat > $P/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="食术养生" android:supportsRtl="true" android:theme="@style/Theme.TWA">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:label="食术养生" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://shishu.xn--fiqs8s/app" />
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR" android:resource="@color/colorPrimary" />
                <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                <intent-filter android:autoVerify="true"><action android:name="android.intent.action.VIEW" /><category android:name="android.intent.category.DEFAULT" /><category android:name="android.intent.category.BROWSABLE" /><data android:scheme="https" android:host="shishu.xn--fiqs8s" /></intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService" android:exported="true">
                <intent-filter><action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE" /><category android:name="android.intent.category.DEFAULT" /></intent-filter>
              </service>
              <meta-data android:name="asset_statements" android:resource="@string/asset_statements" />
            </application>
          </manifest>
          XML
          
          cat > $P/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">食术养生</string><string name="asset_statements">[{\&quot;relation\&quot;: [\&quot;delegate_permission/common.handle_all_urls\&quot;], \&quot;target\&quot;: {\&quot;namespace\&quot;: \&quot;web\&quot;, \&quot;site\&quot;: \&quot;https://shishu.xn--fiqs8s\&quot;}}]</string></resources>
          XML
          
          cat > $P/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><color name="colorPrimary">#1B3A2D</color><color name="colorPrimaryDark">#1B3A2D</color><color name="colorAccent">#4CAF50</color></resources>
          XML
          
          cat > $P/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><style name="Theme.TWA" parent="Theme.AppCompat.Light.NoActionBar"><item name="colorPrimary">@color/colorPrimary</item><item name="colorPrimaryDark">@color/colorPrimaryDark</item><item name="colorAccent">@color/colorAccent</item></style></resources>
          XML
          
          cat > $P/build.gradle << 'GRADLE'
          buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.1.4' } }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE
          
          cat > $P/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
            namespace 'com.shishu.wellness'
            compileSdk 34
            defaultConfig { applicationId "com.shishu.wellness"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0.0" }
            signingConfigs { release { storeFile file('keystore.jks'); storePassword 'android'; keyAlias 'key0'; keyPassword 'android' } }
            buildTypes { release { signingConfig signingConfigs.release; minifyEnabled true } }
          }
          dependencies { implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0' }
          GRADLE
          
          echo 'include ":app"' > $P/settings.gradle
          echo -e 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m' > $P/gradle.properties
          echo "sdk.dir=$ANDROID_HOME" > $P/local.properties
          
          # Build with Gradle
          cd $P
          gradle wrapper --gradle-version 8.4 2>&1
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 || echo "Gradle build failed"
          
          echo "=== APK files ==="
          find /tmp -name '*.apk' -type f 2>/dev/null

      - name: Collect and Upload APK
        if: always()
        run: |
          mkdir -p /tmp/apk-final
          find /tmp -name '*.apk' -type f -exec cp {} /tmp/apk-final/ \; 2>/dev/null
          ls -la /tmp/apk-final/ || echo "No APK files found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: /tmp/apk-final/
          if-no-files-found: warn
