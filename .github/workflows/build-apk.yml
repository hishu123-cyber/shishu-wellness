name: Build Android APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build tools
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Generate signing key
        run: |
          mkdir -p /tmp/twa-keys
          keytool -genkeypair -v -keystore /tmp/twa-keys/release.jks -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Shishu,O=Shishu Wellness,L=Beijing,ST=Beijing,C=CN"
          echo "=== SHA256 Fingerprint ==="
          keytool -list -v -keystore /tmp/twa-keys/release.jks -alias key0 -storepass android 2>&1 | grep SHA256

      - name: Create TWA project and build
        run: |
          P=/tmp/twa-project
          mkdir -p $P/app/src/main/res/values
          for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do mkdir -p $P/app/src/main/res/mipmap-$d; done
          cp /tmp/twa-keys/release.jks $P/app/keystore.jks

          # Generate icons using Python (always available on ubuntu-latest)
          python3 << 'PYEOF'
          import struct, zlib, os
          P = "/tmp/twa-project"
          sizes = {"xxxhdpi": 512, "xxhdpi": 192, "xhdpi": 144, "hdpi": 96, "mdpi": 48}
          for density, size in sizes.items():
              # Create a solid color PNG (#1B3A2D)
              raw = b""
              for y in range(size):
                  raw += b"\x00"  # filter byte
                  raw += bytes([27, 58, 45, 255]) * size  # RGBA
              deflated = zlib.compress(raw)
              # Build PNG
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack(">I", len(data)) + c + struct.pack(">I", zlib.crc32(c) & 0xFFFFFFFF)
              ihdr = struct.pack(">IIBBBBB", size, size, 8, 6, 0, 0, 0)
              png = b"\x89PNG\r\n\x1a\n" + chunk(b"IHDR", ihdr) + chunk(b"IDAT", deflated) + chunk(b"IEND", b"")
              path = os.path.join(P, f"app/src/main/res/mipmap-{density}/ic_launcher.png")
              with open(path, "wb") as f:
                  f.write(png)
              print(f"Created {path} ({size}x{size})")
          PYEOF

          # Write AndroidManifest.xml
          cat > $P/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="Shishu" android:supportsRtl="true" android:theme="@style/Theme.TWA">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:label="Shishu" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://shishu.xn--fiqs8s/app" />
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                <intent-filter android:autoVerify="true"><action android:name="android.intent.action.VIEW"/><category android:name="android.intent.category.DEFAULT"/><category android:name="android.intent.category.BROWSABLE"/><data android:scheme="https" android:host="shishu.xn--fiqs8s"/></intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService" android:exported="true">
                <intent-filter><action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/><category android:name="android.intent.category.DEFAULT"/></intent-filter>
              </service>
              <meta-data android:name="asset_statements" android:resource="@string/asset_statements"/>
            </application>
          </manifest>
          XMLEOF

          cat > $P/app/src/main/res/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">Shishu</string>
            <string name="asset_statements">[{"relation": ["delegate_permission/common.handle_all_urls"], "target": {"namespace": "web", "site": "https://shishu.xn--fiqs8s"}}]</string>
          </resources>
          XMLEOF

          cat > $P/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#1B3A2D</color>
            <color name="colorPrimaryDark">#1B3A2D</color>
            <color name="colorAccent">#4CAF50</color>
          </resources>
          XMLEOF

          cat > $P/app/src/main/res/values/styles.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.TWA" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
            </style>
          </resources>
          XMLEOF

          cat > $P/build.gradle << 'GRADLEEOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:8.1.4" }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLEEOF

          cat > $P/app/build.gradle << 'GRADLEEOF'
          apply plugin: "com.android.application"
          android {
            namespace "com.shishu.wellness"
            compileSdk 34
            defaultConfig {
              applicationId "com.shishu.wellness"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0.0"
            }
            signingConfigs {
              release {
                storeFile file("keystore.jks")
                storePassword "android"
                keyAlias "key0"
                keyPassword "android"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled true
              }
            }
          }
          dependencies {
            implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
          }
          GRADLEEOF

          printf 'include ":app"\n' > $P/settings.gradle
          printf 'android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m\n' > $P/gradle.properties
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > $P/local.properties

          echo "=== Project structure ==="
          find $P -type f | grep -v '.jks' | sort

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build APK with Gradle
        run: |
          cd /tmp/twa-project
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -80
          echo "=== APK files ==="
          find /tmp/twa-project -name "*.apk" -type f

      - name: Locate APK
        if: always()
        run: find /tmp/twa-project -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: /tmp/twa-project/app/build/outputs/
          if-no-files-found: warn
