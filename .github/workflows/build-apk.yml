name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'manifest.json'
      - 'sw.js'
  workflow_dispatch:
    inputs:
      version:
        description: 'APK version name'
        required: false
        default: '1.0.0'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Validate PWA manifest
        run: |
          if [ ! -f frontend/manifest.json ]; then
            echo "manifest.json not found!"
            exit 1
          fi
          echo "✅ manifest.json exists"
          cat frontend/manifest.json | python3 -m json.tool || true

      - name: Generate APK with Bubblewrap
        run: |
          # Install Bubblewrap globally
          npm install -g @bubblewrap/cli

          # Generate icons (simple colored PNGs using ImageMagick)
          mkdir -p /tmp/pwa-icons
          if command -v convert &> /dev/null; then
            convert -size 512x512 xc:'#1B3A2D' -fill white -font Helvetica -pointsize 200 \
              -gravity center -annotate +0+0 '食' /tmp/pwa-icons/icon-512.png
            convert -size 192x192 xc:'#1B3A2D' -fill white -font Helvetica -pointsize 80 \
              -gravity center -annotate +0+0 '食' /tmp/pwa-icons/icon-192.png
          else
            # Fallback: minimal PNG via Python
            python3 -c "
import struct, zlib
def make_png(size, name):
    raw = b''
    for y in range(size):
        raw += b'\x00'  # filter byte
        for x in range(size):
            raw += b'\x1b\x3a\x2d\xff'  # RGBA dark green
    def chunk(t, d):
        c = struct.pack('>I', len(d)) + t + d
        c += struct.pack('>I', zlib.crc32(c[4:]) & 0xffffffff)
        return c
    ihdr = struct.pack('>IIBBBBB', size, size, 8, 6, 0, 0, 0)
    idat = zlib.compress(raw)
    png = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
    open(name, 'wb').write(png)
make_png(512, '/tmp/pwa-icons/icon-512.png')
make_png(192, '/tmp/pwa-icons/icon-192.png')
"
          fi
          ls -la /tmp/pwa-icons/
          echo '✅ Icons generated'

      - name: Copy frontend files for PWA packaging
        run: |
          mkdir -p /tmp/pwa-build
          cp -r frontend/* /tmp/pwa-build/
          cp -r /tmp/pwa-icons/* /tmp/pwa-build/
          # Update manifest.json icon paths to relative
          cd /tmp/pwa-build
          python3 -c "
import json
with open('manifest.json', 'r') as f:
    m = json.load(f)
for icon in m.get('icons', []):
    icon['src'] = icon['src'].split('/')[-1]  # use just filename
    icon['type'] = icon['type'] or 'image/png'
with open('manifest.json', 'w') as f:
    json.dump(m, f, ensure_ascii=False, indent=2)
print(json.dumps(m, ensure_ascii=False, indent=2))
"
          # Start a local server for Bubblewrap to fetch manifest
          python3 -m http.server 9999 --directory /tmp/pwa-build &
          SERVER_PID=$!
          sleep 2

          # Bubblewrap init with non-interactive flags
          npx @bubblewrap/cli init \
            --manifest=http://localhost:9999/manifest.json \
            --directory=/tmp/app-output \
            --jvm=/usr/lib/jvm/temurin-17-jdk-amd64 \
            --androidSdkPath=$ANDROID_HOME \
            --signingMode=none \
            2>&1 || true

          kill $SERVER_PID 2>/dev/null || true
          
          # Show what we got
          echo '=== Build directory ==='
          find /tmp/app-output -type f -name '*.gradle*' -o -name 'gradlew' -o -name '*.apk' 2>/dev/null | head -20
          ls -la /tmp/app-output/ 2>/dev/null || echo 'No build output'

      - name: Build APK with Gradle (if Bubblewrap succeeded)
        run: |
          if [ -f /tmp/app-output/gradlew ]; then
            cd /tmp/app-output
            chmod +x gradlew
            ./gradlew assembleRelease 2>&1 || true
            echo '=== APK files ==='
            find . -name '*.apk' -type f 2>/dev/null
          else
            echo '⚠️ Bubblewrap init failed - using alternative method'
            # Try direct bubblewrap build command
            if [ -d /tmp/app-output ]; then
              cd /tmp/app-output
              npx @bubblewrap/cli build 2>&1 || true
            fi
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wellness-app-apk
          path: |
            /tmp/app-output/**/*.apk
            /tmp/app-output/app-release.apk
            /tmp/app-output/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        run: |
          echo '## 📱 APK Build Summary' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          APKS=$(find /tmp /tmp/app-output -name '*.apk' -type f 2>/dev/null | wc -l)
          echo "- APK files found: **$APKS**" >> $GITHUB_STEP_SUMMARY
          if [ "$APKS" -gt 0 ]; then
            echo "- ✅ Build successful" >> $GITHUB_STEP_SUMMARY
            find /tmp /tmp/app-output -name '*.apk' -type f 2>/dev/null | while read f; do
              echo "  - \`$f\` ($(stat -c%s "$f" 2>/dev/null | numfmt --to=iec || echo '?'))" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- ❌ Build failed - check logs" >> $GITHUB_STEP_SUMMARY
            echo "- ⚠️ The PWA can still be used directly via browser: https://shishu.中国" >> $GITHUB_STEP_SUMMARY
          fi
