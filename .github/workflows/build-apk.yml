name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses 2>&1

      - name: Generate signing key
        run: |
          mkdir -p /tmp/twa-keys
          keytool -genkeypair -v -keystore /tmp/twa-keys/release.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Shishu,O=Shishu Wellness,L=Beijing,ST=Beijing,C=CN"
          echo "=== SHA256 Fingerprint ==="
          keytool -list -v -keystore /tmp/twa-keys/release.jks -alias key0 -storepass android 2>&1 | grep SHA256

      - name: Create TWA project
        run: |
          set -euxo pipefail
          P=/tmp/twa-project
          mkdir -p $P/app/src/main/res/values
          for d in xxxhdpi xxhdpi xhdpi hdpi mdpi; do mkdir -p $P/app/src/main/res/mipmap-$d; done
          cp /tmp/twa-keys/release.jks $P/app/keystore.jks

          # AndroidManifest.xml
          cat > $P/app/src/main/AndroidManifest.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
                android:label="食术养生" android:supportsRtl="true"
                android:theme="@style/Theme.TWA">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                  android:label="食术养生" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                    android:value="https://shishu.xn--fiqs8s/app" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:scheme="https" android:host="shishu.xn--fiqs8s" />
                </intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                  android:exported="true">
                <intent-filter>
                  <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE" />
                  <category android:name="android.intent.category.DEFAULT" />
                </intent-filter>
              </service>
              <meta-data android:name="asset_statements" android:resource="@string/asset_statements" />
            </application>
          </manifest>
          XMLEOF

          cat > $P/app/src/main/res/values/strings.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?><resources>
            <string name="app_name">食术养生</string>
            <string name="asset_statements">[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"web","site":"https://shishu.xn--fiqs8s"}}]</string>
          </resources>
          XMLEOF

          cat > $P/app/src/main/res/values/colors.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?><resources>
            <color name="colorPrimary">#1B3A2D</color>
            <color name="colorPrimaryDark">#1B3A2D</color>
            <color name="colorAccent">#4CAF50</color>
          </resources>
          XMLEOF

          cat > $P/app/src/main/res/values/styles.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?><resources>
            <style name="Theme.TWA" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
            </style>
          </resources>
          XMLEOF

          cat > $P/settings.gradle << 'EOF'
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "Shishu"
          include ":app"
          EOF

          cat > $P/build.gradle << 'EOF'
          plugins {
            id "com.android.application" version "8.1.4" apply false
          }
          EOF

          cat > $P/app/build.gradle << 'GRADLEEOF'
          plugins {
            id "com.android.application"
          }
          android {
            namespace "com.shishu.wellness"
            compileSdk 34
            defaultConfig {
              applicationId "com.shishu.wellness"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0.0"
            }
            signingConfigs {
              release {
                storeFile file("keystore.jks")
                storePassword "android"
                keyAlias "key0"
                keyPassword "android"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled false
              }
            }
          }
          dependencies {
            implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
          }
          GRADLEEOF

          echo 'android.useAndroidX=true' > $P/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> $P/gradle.properties
          echo "sdk.dir=$ANDROID_HOME" > $P/local.properties

          # Generate PNG icons via Node.js
          node -e "
          const fs=require('fs'),zl=require('zlib');
          function mkPng(s){
            const b=Buffer.alloc(s*(s*4+1));
            for(let y=0;y<s;y++){let o=y*(s*4+1);b[o++]=0;
              for(let x=0;x<s;x++){
                const d=Math.sqrt((x-s/2)**2+(y-s/2)**2)/(s/2);
                if(d<0.85){b[o++]=27;b[o++]=58;b[o++]=45;b[o++]=255;}else{b[o++]=0;b[o++]=0;b[o++]=0;b[o++]=0;}
              }}
            const df=zl.deflateSync(b);
            const c=(t,d)=>{const l=Buffer.alloc(4);l.writeUInt32BE(d.length);const tb=Buffer.from(t);const cr=Buffer.alloc(4);cr.writeUInt32BE(zl.crc32(Buffer.concat([tb,d]))>>>0);return Buffer.concat([l,tb,d,cr]);};
            const ih=Buffer.alloc(13);ih.writeUInt32BE(s);ih.writeUInt32BE(s,4);ih[8]=8;ih[9]=6;
            return Buffer.concat([Buffer.from([137,80,78,71,13,10,26,10]),c('IHDR',ih),c('IDAT',df),c('IEND',Buffer.alloc(0))]);
          }
          const dirs={xxxhdpi:512,xxhdpi:192,xhdpi:144,hdpi:96,mdpi:48};
          Object.entries(dirs).forEach(([d,s])=>fs.writeFileSync('/tmp/twa-project/app/src/main/res/mipmap-'+d+'/ic_launcher.png',mkPng(s)));
          console.log('Icons created:', Object.keys(dirs).join(', '));
          "

          echo "=== Project files ==="
          find $P -type f | sort

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/twa-project
          echo "=== Generate Gradle wrapper ==="
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          echo "=== Running assembleRelease ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
          echo "=== Searching for APKs ==="
          find /tmp/twa-project -name "*.apk" -type f
          ls -la /tmp/twa-project/app/build/outputs/ 2>/dev/null
          find /tmp/twa-project/app/build -type f | head -30

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: wellness-app-apk
          path: /tmp/twa-project/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
