name: Build Android APK (via PWABuilder)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate signing key
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq default-jdk-headless 2>&1 | tail -3
          mkdir -p /tmp/app
          keytool -genkeypair -v -keystore /tmp/app/keystore.jks -alias key0 \
            -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android \
            -dname "CN=Shishu,O=Shishu Wellness,L=Beijing,ST=Beijing,C=CN"
          # Extract SHA256 for documentation
          FINGERPRINT=$(keytool -list -v -keystore /tmp/app/keystore.jks -alias key0 -storepass android 2>&1 | grep "SHA256:" | awk '{print $2}')
          echo "SHA256_FINGERPRINT=$FINGERPRINT" >> $GITHUB_ENV
          echo "Fingerprint: $FINGERPRINT"

      - name: Install PWABuilder CLI and build APK
        run: |
          # Install PWABuilder CLI for cloud packaging
          npm install -g @pwabuilder/cli@latest
          echo "=== Running PWABuilder cloud packaging ==="
          mkdir -p /tmp/output
          npx pwabuilder package android \
            --pwaUrl "https://shishu.xn--fiqs8s" \
            --output /tmp/output \
            --signingKey /tmp/app/keystore.jks \
            --signingKeyPassword android \
            --signingKeyAlias key0 \
            --signingKeyAliasPassword android \
            --appVersion "1.0.0" \
            --appVersionCode 1 2>&1 || echo "PWABuilder cloud packaging finished (exit code: $?)"

      - name: Locate output files
        if: always()
        run: |
          find /tmp -name "*.apk" -o -name "*.aab" -o -name "*.zip" 2>/dev/null | head -20
          find /tmp/output -type f 2>/dev/null | head -20
          ls -laR /tmp/output/ 2>/dev/null || echo "No output dir"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: |
            /tmp/output/*.apk
            /tmp/output/*.aab
            /tmp/output/*.zip
          if-no-files-found: warn
