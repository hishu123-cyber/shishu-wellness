name: Build Android APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          ANDROID_SDK_ROOT=/tmp/android-sdk
          mkdir -p $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d $ANDROID_SDK_ROOT/
          mkdir -p $ANDROID_SDK_ROOT/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/* $ANDROID_SDK_ROOT/latest/ 2>/dev/null || true
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$PATH:$ANDROID_SDK_ROOT/latest/bin
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Generate signing key
        run: |
          mkdir -p /tmp/twa-keys
          keytool -genkeypair -v -keystore /tmp/twa-keys/release.jks -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Shishu,O=Shishu Wellness,L=Beijing,ST=Beijing,C=CN"
          keytool -list -v -keystore /tmp/twa-keys/release.jks -alias key0 -storepass android 2>&1 | grep SHA256

      - name: Create TWA project files
        run: |
          P=/tmp/twa-project
          mkdir -p $P/app/src/main/res/values
          mkdir -p $P/app/src/main/res/mipmap-hdpi
          mkdir -p $P/app/src/main/res/mipmap-mdpi
          mkdir -p $P/app/src/main/res/mipmap-xhdpi
          mkdir -p $P/app/src/main/res/mipmap-xxhdpi
          mkdir -p $P/app/src/main/res/mipmap-xxxhdpi
          cp /tmp/twa-keys/release.jks $P/app/keystore.jks

          # Write all project files using base64 to avoid YAML escaping issues
          node -e '
          const fs = require("fs");
          const P = "/tmp/twa-project";

          fs.writeFileSync(P + "/app/src/main/AndroidManifest.xml", `<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher" android:label="食术养生" android:supportsRtl="true" android:theme="@style/Theme.TWA">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity" android:label="食术养生" android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL" android:value="https://shishu.xn--fiqs8s/app" />
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                <intent-filter android:autoVerify="true"><action android:name="android.intent.action.VIEW"/><category android:name="android.intent.category.DEFAULT"/><category android:name="android.intent.category.BROWSABLE"/><data android:scheme="https" android:host="shishu.xn--fiqs8s"/></intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService" android:exported="true">
                <intent-filter><action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/><category android:name="android.intent.category.DEFAULT"/></intent-filter>
              </service>
              <meta-data android:name="asset_statements" android:resource="@string/asset_statements"/>
            </application>
          </manifest>`);

          fs.writeFileSync(P + "/app/src/main/res/values/strings.xml", `<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">食术养生</string>
            <string name="asset_statements">[{"relation": ["delegate_permission/common.handle_all_urls"], "target": {"namespace": "web", "site": "https://shishu.xn--fiqs8s"}}]</string>
          </resources>`);

          fs.writeFileSync(P + "/app/src/main/res/values/colors.xml", `<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#1B3A2D</color>
            <color name="colorPrimaryDark">#1B3A2D</color>
            <color name="colorAccent">#4CAF50</color>
          </resources>`);

          fs.writeFileSync(P + "/app/src/main/res/values/styles.xml", `<?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.TWA" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
            </style>
          </resources>`);

          fs.writeFileSync(P + "/build.gradle", `buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath "com.android.tools.build:gradle:8.1.4" }
          }
          allprojects { repositories { google(); mavenCentral() } }`);

          fs.writeFileSync(P + "/app/build.gradle", `apply plugin: "com.android.application"
          android {
            namespace "com.shishu.wellness"
            compileSdk 34
            defaultConfig {
              applicationId "com.shishu.wellness"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0.0"
            }
            signingConfigs {
              release {
                storeFile file("keystore.jks")
                storePassword "android"
                keyAlias "key0"
                keyPassword "android"
              }
            }
            buildTypes {
              release {
                signingConfig signingConfigs.release
                minifyEnabled true
              }
            }
          }
          dependencies {
            implementation "com.google.androidbrowserhelper:androidbrowserhelper:2.5.0"
          }`);

          fs.writeFileSync(P + "/settings.gradle", "include \":app\"");
          fs.writeFileSync(P + "/gradle.properties", "android.useAndroidX=true\norg.gradle.jvmargs=-Xmx2048m");
          fs.writeFileSync(P + "/local.properties", "sdk.dir=" + process.env.ANDROID_HOME);

          // Generate PNG icons programmatically
          const { createCanvas } = (() => { try { return require("canvas"); } catch(e) { return { createCanvas: null }; } })();

          function writePNG(path, size) {
            // Pure Node.js PNG generation (no dependencies)
            const zlib = require("zlib");
            const raw = Buffer.alloc((size * 4 + 1) * size);
            for (let y = 0; y < size; y++) {
              raw[y * (size * 4 + 1)] = 0; // filter byte
              for (let x = 0; x < size; x++) {
                const off = y * (size * 4 + 1) + 1 + x * 4;
                raw[off] = 27; raw[off+1] = 58; raw[off+2] = 45; raw[off+3] = 255; // #1B3A2D
              }
            }
            const deflated = zlib.deflateSync(raw);
            const buf = Buffer.alloc(8 + 12 + 13 + 12 + deflated.length + 12 + 0);
            // PNG signature
            buf.write("\x89PNG\r\n\x1a\n", 0);
            let pos = 8;
            function writeChunk(type, data) {
              buf.writeUInt32BE(data.length, pos); pos += 4;
              buf.write(type, pos); pos += 4;
              data.copy(buf, pos); pos += data.length;
              const crc = require("zlib").crc32(Buffer.concat([Buffer.from(type), data]));
              buf.writeUInt32BE(crc >>> 0, pos); pos += 4;
            }
            const ihdr = Buffer.alloc(13);
            ihdr.writeUInt32BE(size, 0); ihdr.writeUInt32BE(size, 4);
            ihdr[8] = 8; ihdr[9] = 6; ihdr[10] = 0; ihdr[11] = 0; ihdr[12] = 0;
            writeChunk("IHDR", ihdr);
            writeChunk("IDAT", deflated);
            writeChunk("IEND", Buffer.alloc(0));
            fs.writeFileSync(path, buf.slice(0, pos));
          }

          const sizes = { "xxxhdpi": 512, "xxhdpi": 192, "xhdpi": 144, "hdpi": 96, "mdpi": 48 };
          for (const [density, size] of Object.entries(sizes)) {
            writePNG(`${P}/app/src/main/res/mipmap-${density}/ic_launcher.png`, size);
          }

          console.log("Project files created successfully");
          '

      - name: Build APK with Gradle
        run: |
          cd /tmp/twa-project
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -80
          find /tmp/twa-project -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: /tmp/twa-project/app/build/outputs/apk/
          if-no-files-found: warn
