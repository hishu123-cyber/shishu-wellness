name: Build Android APK (TWA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate signing key and print fingerprint
        run: |
          mkdir -p /tmp/twa-build/app
          keytool -genkeypair -v \
            -keystore /tmp/twa-build/app/keystore.jks \
            -alias key0 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Shishu, OU=Dev, O=Shishu Wellness, L=Beijing, ST=Beijing, C=CN"
          echo "=== SHA256 Certificate Fingerprint (for assetlinks.json) ==="
          keytool -list -v -keystore /tmp/twa-build/app/keystore.jks -alias key0 -storepass android 2>&1 | grep SHA256 || true

      - name: Create TWA Android project
        run: |
          T=/tmp/twa-build
          mkdir -p $T/app/src/main/java
          mkdir -p $T/app/src/main/res/{values,mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}

          # Create icons with Python
          pip3 install Pillow -q
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os
          sizes = {'xxxhdpi': 512, 'xxhdpi': 192, 'xhdpi': 144, 'hdpi': 96, 'mdpi': 48}
          base = '/tmp/twa-build/app/src/main/res'
          for density, size in sizes.items():
              img = Image.new('RGBA', (size, size), (27, 58, 45, 255))
              d = ImageDraw.Draw(img)
              font_size = size // 3
              font = None
              for fp in ['/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc',
                         '/usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc',
                         '/usr/share/fonts/noto-cjk/NotoSansCJK-Regular.ttc']:
                  if os.path.exists(fp):
                      try:
                          font = ImageFont.truetype(fp, font_size)
                          break
                      except: pass
              if not font:
                  font = ImageFont.load_default(size=font_size)
              text = '食'
              bbox = d.textbbox((0,0), text, font=font)
              w = bbox[2]-bbox[0]; h = bbox[3]-bbox[1]
              d.text(((size-w)//2, (size-h)//2 - bbox[1]), text, fill='white', font=font)
              path = f'{base}/mipmap-{density}/ic_launcher.png'
              img.save(path)
              print(f'Created {path} ({size}x{size})')
          PYEOF

          # AndroidManifest.xml
          cat > $T/app/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
              android:allowBackup="true"
              android:icon="@mipmap/ic_launcher"
              android:label="食术养生"
              android:supportsRtl="true"
              android:theme="@style/Theme.TWA">
              <activity android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                android:label="食术养生"
                android:exported="true">
                <meta-data android:name="android.support.customtabs.trusted.DEFAULT_URL"
                  android:value="https://shishu.xn--fiqs8s/app" />
                <meta-data android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                  android:resource="@color/colorPrimary" />
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
                <intent-filter android:autoVerify="true">
                  <action android:name="android.intent.action.VIEW" />
                  <category android:name="android.intent.category.DEFAULT" />
                  <category android:name="android.intent.category.BROWSABLE" />
                  <data android:scheme="https" android:host="shishu.xn--fiqs8s" />
                </intent-filter>
              </activity>
              <service android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                android:exported="true">
                <intent-filter>
                  <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE" />
                  <category android:name="android.intent.category.DEFAULT" />
                </intent-filter>
              </service>
              <meta-data android:name="asset_statements" android:resource="@string/asset_statements" />
            </application>
          </manifest>
          XML

          cat > $T/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <string name="app_name">食术养生</string>
            <string name="asset_statements">[{\&quot;relation\&quot;: [\&quot;delegate_permission/common.handle_all_urls\&quot;], \&quot;target\&quot;: {\&quot;namespace\&quot;: \&quot;web\&quot;, \&quot;site\&quot;: \&quot;https://shishu.xn--fiqs8s\&quot;}}]</string>
          </resources>
          XML

          cat > $T/app/src/main/res/values/colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#1B3A2D</color>
            <color name="colorPrimaryDark">#1B3A2D</color>
            <color name="colorAccent">#4CAF50</color>
          </resources>
          XML

          cat > $T/app/src/main/res/values/styles.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="Theme.TWA" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
            </style>
          </resources>
          XML

          # build.gradle (project level)
          cat > $T/build.gradle << 'GRADLE'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE

          # build.gradle (app level)
          cat > $T/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
            namespace 'com.shishu.wellness'
            compileSdk 34
            defaultConfig {
              applicationId "com.shishu.wellness"
              minSdk 21
              targetSdk 34
              versionCode 1
              versionName "1.0.0"
            }
            signingConfigs {
              release {
                storeFile file('keystore.jks')
                storePassword 'android'
                keyAlias 'key0'
                keyPassword 'android'
              }
            }
            buildTypes {
              release { signingConfig signingConfigs.release; minifyEnabled true }
            }
          }
          dependencies {
            implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          GRADLE

          echo 'include ":app"' > $T/settings.gradle

          cat > $T/gradle.properties << 'PROPS'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          # Gradle wrapper
          mkdir -p $T/gradle/wrapper
          cat > $T/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          WRAPPER

          echo "=== Project structure ==="
          find $T -type f | grep -v '.jks' | head -25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build Release APK
        working-directory: /tmp/twa-build
        run: |
          gradle assembleRelease --no-daemon --stacktrace 2>&1 || true
          echo "=== APK output ==="
          find /tmp/twa-build -name '*.apk' -type f || echo "No APK found"
          echo "=== Build output directory ==="
          ls -la /tmp/twa-build/app/build/outputs/apk/release/ 2>/dev/null || echo "No release dir"
          ls -la /tmp/twa-build/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          # Check for build errors
          cat /tmp/twa-build/app/build/reports/errors.html 2>/dev/null | head -50 || true
          # Fail if no APK
          if ! find /tmp/twa-build -name '*.apk' -type f | grep -q apk; then
            echo "ERROR: No APK generated"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wellness-app-apk
          path: /tmp/twa-build/app/build/outputs/apk/release/
          if-no-files-found: warn
