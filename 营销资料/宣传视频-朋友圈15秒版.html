const loaded={};
function preload(cb){let n=Object.keys(IMGS).length,l=0;for(const k of Object.keys(IMGS)){const img=new Image();img.onload=()=>{l++;if(l===n)cb();};img.onerror=()=>{l++;if(l===n)cb();};img.src=IMGS[k];loaded[k]=img;}}

const CLIPS=[
  {img:'home',s:0,e:3.5,title:'体质养生·大健康',sub:'1分钟测出你的体质'},
  {img:'constitution',s:3.5,e:6.5,title:'',sub:'9种体质精准识别'},
  {img:'ai',s:6.5,e:10,title:'',sub:'AI自动匹配食谱+方案'},
  {img:'shop',s:10,e:12.5,title:'',sub:'食材一键下单送到家'},
  {img:'profile',s:12.5,e:15,title:'',sub:'产品已上线·找合伙人'},
];

function getClip(t){for(const c of CLIPS)if(t>=c.s&&t<c.e)return c;return CLIPS[CLIPS.length-1];}

let playing=false,startTime=0,currentTime=0,fid=null;
function render(){
  if(!startTime)startTime=performance.now();
  if(playing){currentTime=(performance.now()-startTime)/1000;if(currentTime>=TOTAL){currentTime=TOTAL;playing=false;document.getElementById('playBtn').textContent='▶';}}
  const ctx=document.getElementById('video').getContext('2d');
  ctx.clearRect(0,0,W,H);
  const clip=getClip(currentTime);
  const img=loaded[clip.img];
  if(img&&img.complete){
    // Fill canvas maintaining aspect ratio  
    ctx.drawImage(img,0,0,W,H);
    
    // Dark overlays
    const g1=ctx.createLinearGradient(0,0,0,90);g1.addColorStop(0,'rgba(0,0,0,0.55)');g1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g1;ctx.fillRect(0,0,W,90);
    
    if(clip.title){
      ctx.fillStyle='#4CAF50';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText(clip.title,W/2,18);
    }
    
    // Bottom gradient + text
    const g2=ctx.createLinearGradient(0,H-70,0,H);g2.addColorStop(0,'rgba(0,0,0,0)');g2.addColorStop(1,'rgba(0,0,0,0.65)');
    ctx.fillStyle=g2;ctx.fillRect(0,H-70,W,70);
    ctx.fillStyle='#fff';ctx.font='bold 17px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(clip.sub,W/2,H-18);
    
    // Small brand at top right
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.textBaseline='top';
    ctx.fillText('体质养生',W-12,12);
  } else {
    ctx.fillStyle='#0d0d1a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#4CAF50';ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText('体质养生·大健康',W/2,H/2);
  }
  document.getElementById('progress').style.width=((currentTime/TOTAL)*100)+'%';
  fid=requestAnimationFrame(render);
}

function togglePlay(){
  if(playing){playing=false;document.getElementById('playBtn').textContent='▶';}
  else{if(currentTime>=TOTAL){currentTime=0;startTime=0;}playing=true;startTime=performance.now()-currentTime*1000;document.getElementById('playBtn').textContent='⏸';if(!fid)render();}
}
function restart(){playing=false;currentTime=0;startTime=0;document.getElementById('playBtn').textContent='▶';}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();togglePlay();}});
preload(()=>{render();document.getElementById('playBtn').textContent='▶';console.log('✅ 朋友圈版 ready');});
</script>
