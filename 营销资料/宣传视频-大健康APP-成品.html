const SCRIPT = [[0,5.5,"你是不是也有这种感觉——体检报告越来越长，身体却越来越虚。"],[5.5,11,"我们花了快一年，做了一个真正懂你体质的养生APP。"],[11,17,"1分钟做几道题，AI精准分析你的体质类型。九种体质全覆盖。"],[17,24,"AI自动匹配食谱——气虚吃什么、湿气重喝什么。还能定制一周食谱、24节气。"],[24,29,"每天1分钟记个健康日记，一周后就能看到自己的健康趋势。"],[29,35,"测完体质拿到食谱，食材一键下单送到家。"],[35,41,"从PRD到开发到28项测试通过到云服务器，我们已经做到了。"],[41,48,"现在寻找原始股东，1万元起投，签协议拿股份享分红。"],[48,55,"私信我，发你完整商业计划书和产品演示。"]];

// Preload images
const loadedImgs = {};
function preload(cb) {
  const keys = Object.keys(IMGS);
  let loaded = 0;
  for (const k of keys) {
    const img = new Image();
    img.onload = () => { loaded++; if (loaded===keys.length) cb(); };
    img.onerror = () => { loaded++; if (loaded===keys.length) cb(); };
    img.src = IMGS[k];
    loadedImgs[k] = img;
  }
}

let playing=false, frameId=null, startTime=0, currentTime=0;

function getScene(t) {
  // Text intro
  if (t<5.5) return {type:'intro', s:t, e:5.5};
  // Text invest
  if (t>=41 && t<48) return {type:'invest', s:41, e:48};
  // Text outro
  if (t>=48) return {type:'outro', s:48, e:55};
  
  const scenes = [
    {type:'screenshot',key:'home',s:5.5,e:11,labels:['先测体质','再配方案','买得到食材']},
    {type:'screenshot',key:'constitution',s:11,e:17,labels:['9种体质识别','AI分析报告']},
    {type:'screenshot',key:'ai',s:17,e:24,labels:['体质分析·一周食谱','7天挑战·症状自查']},
    {type:'screenshot',key:'diary',s:24,e:29,labels:['睡眠·运动·饮食·心情','7天趋势图']},
    {type:'screenshot',key:'shop',s:29,e:35,labels:['体质食谱食材','一键下单配送']},
    {type:'screenshot',key:'profile',s:35,e:41,labels:['20+ API接口','28项测试通过','阿里云部署']},
  ];
  for (const sc of scenes) {
    if (t>=sc.s && t<sc.e) return sc;
  }
  return {type:'intro',s:0,e:5.5};
}

function getSubtitle(t) {
  for (const s of SCRIPT) if(t>=s[0]&&t<s[1]) return s[2];
  return '';
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawTextScene(elements, bg) {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, bg||'#0a0a0a');
  grad.addColorStop(1, '#1a2a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  
  for (const el of elements) {
    const dt = currentTime - el.t - (el.sceneStart||0);
    if (dt < 0) continue;
    const alpha = Math.min(1, dt * 1.5);
    const yOff = Math.max(0, (0.4-dt)*-30);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = el.color || '#fff';
    ctx.font = (el.weight||'normal') + ' ' + (el.size||20) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(el.text, W/2, H/2 - 60 + yOff + (el.line||0)*50);
    ctx.restore();
  }
}

function drawIntro() {
  drawTextScene([
    {text:'14亿中国人里',size:20,color:'#888',t:0.2,line:-2},
    {text:'真正健康的',size:22,color:'#aaa',t:1.5,line:-1},
    {text:'不到5%',size:48,color:'#ff6b6b',weight:'bold',t:1.5,line:0},
    {text:'剩下95%都处于亚健康',size:18,color:'#999',t:3,line:1.5},
    {text:'你呢？',size:16,color:'#4CAF50',t:4.2,line:2.5},
  ], '#0a0a0a');
}

function drawInvest() {
  drawTextScene([
    {text:'寻找原始股东',size:28,color:'#4CAF50',weight:'bold',t:0.3,line:-1},
    {text:'1万元起投',size:22,color:'#fff',t:1.8,line:0.5},
    {text:'签协议 · 拿股份 · 享分红',size:16,color:'#4CAF50',t:3.5,line:1.5},
    {text:'限额10席 · 产品已上线 · 款用于增长',size:13,color:'#666',t:5,line:2.8},
  ], '#0a0a0a');
}

function drawOutro() {
  drawTextScene([
    {text:'私信了解详情',size:20,color:'#888',t:0.5,line:-1},
    {text:'体质养生·大健康',size:24,color:'#4CAF50',weight:'bold',t:2,line:0.5},
    {text:'发你完整商业计划书+产品演示',size:14,color:'#666',t:3.5,line:1.8},
  ], '#0a0a0a');
}

function drawScreenshot(scene) {
  const img = loadedImgs[scene.key];
  if (!img || !img.complete) {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#4CAF50';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('体质养生', W/2, H/2-20);
    ctx.fillStyle = '#666';
    ctx.font = '12px sans-serif';
    ctx.fillText(scene.key, W/2, H/2+10);
    ctx.textAlign = 'left';
    return;
  }
  
  // Draw screenshot - fill full canvas
  ctx.drawImage(img, 0, 0, W, H);
  
  // Dark overlay at bottom for text
  const grad = ctx.createLinearGradient(0, H-140, 0, H);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H-140, W, 140);
  
  // Labels
  if (scene.labels) {
    const relT = currentTime - scene.s;
    scene.labels.forEach((label, i) => {
      const showDelay = 0.5 + i * 1.2;
      const dt = relT - showDelay;
      if (dt < 0) return;
      const alpha = Math.min(1, dt * 2);
      const yOff = Math.max(0, (0.3-dt)*-20);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#4CAF50';
      ctx.font = 'bold 12px sans-serif';
      const tagW = ctx.measureText(label).width + 20;
      roundRect(W/2-tagW/2, H-60-(scene.labels.length-1-i)*34 + yOff, tagW, 26, 13);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillText(label, W/2, H-60-(scene.labels.length-1-i)*34 + yOff + 18);
      ctx.restore();
    });
  }
}

function render() {
  if (!startTime) startTime = performance.now();
  if (playing) {
    currentTime = (performance.now() - startTime) / 1000;
    if (currentTime >= TOTAL) {
      currentTime = TOTAL;
      playing = false;
      document.getElementById('playBtn').textContent = '▶ 播放';
    }
  }
  
  const scene = getScene(currentTime);
  
  ctx.clearRect(0,0,W,H);
  
  if (scene.type === 'intro') drawIntro();
  else if (scene.type === 'invest') drawInvest();
  else if (scene.type === 'outro') drawOutro();
  else drawScreenshot(scene);
  
  // Subtitle
  const sub = getSubtitle(currentTime);
  if (sub) {
    let relInScene = 0;
    for (const s of SCRIPT) {
      if (currentTime>=s[0] && currentTime<s[1]) {
        relInScene = (currentTime-s[0])/(s[1]-s[0]);
        break;
      }
    }
    let alpha = 1;
    if (relInScene < 0.08) alpha = relInScene/0.08;
    else if (relInScene > 0.92) alpha = (1-relInScene)/0.08;
    
    if (alpha > 0) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      roundRect(10, H-85, W-20, 52, 10);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      const m = ctx.measureText(sub);
      if (m.width < W-40) {
        ctx.fillText(sub, W/2, H-56);
      } else {
        const mid = Math.floor(sub.length/2);
        // Find a good split point
        let splitAt = sub.indexOf('。');
        if (splitAt < 0) splitAt = sub.indexOf('，');
        if (splitAt < 0) splitAt = sub.indexOf('——');
        if (splitAt < 0) splitAt = sub.indexOf('——');
        if (splitAt < 3) splitAt = mid;
        else splitAt++;
        ctx.font = '12px sans-serif';
        ctx.fillText(sub.substring(0,splitAt), W/2, H-68);
        ctx.fillText(sub.substring(splitAt), W/2, H-46);
      }
      ctx.restore();
    }
  }
  
  // Progress
  document.getElementById('progress').style.width = ((currentTime/TOTAL)*100)+'%';
  const m=Math.floor(currentTime/60), s=Math.floor(currentTime%60);
  document.getElementById('status').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  
  frameId = requestAnimationFrame(render);
}

function togglePlay() {
  if (playing) {
    playing = false;
    document.getElementById('playBtn').textContent = '▶ 播放';
  } else {
    if (currentTime >= TOTAL) { currentTime = 0; startTime = 0; }
    playing = true;
    startTime = performance.now() - currentTime * 1000;
    document.getElementById('playBtn').textContent = '⏸ 暂停';
    if (!frameId) render();
  }
}

function restart() {
  playing = false;
  currentTime = 0;
  startTime = 0;
  render();
  document.getElementById('playBtn').textContent = '▶ 播放';
}

let recorder = null;
let chunks = [];

function startRecording() {
  if (!confirm('将录制并下载 ' + Math.round(TOTAL) + ' 秒宣传视频。')) return;
  
  chunks = [];
  const canvas = document.getElementById('video');
  const stream = canvas.captureStream(30);
  
  let mimeType = 'video/webm;codecs=vp9';
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    mimeType = 'video/webm;codecs=vp8';
    if (!MediaRecorder.isTypeSupported(mimeType)) {
      mimeType = 'video/webm';
    }
  }
  
  recorder = new MediaRecorder(stream, { mimeType });
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '大健康APP宣传视频.webm';
    a.click();
    URL.revokeObjectURL(url);
    document.getElementById('playBtn').textContent = '▶ 播放';
    document.getElementById('recBtn').textContent = '⬇ 导出';
  };
  
  recorder.start(100);
  document.getElementById('recBtn').textContent = '⏺ 录制中...';
  
  currentTime = 0;
  startTime = performance.now();
  playing = true;
  document.getElementById('playBtn').textContent = '⏸ 暂停';
  if (!frameId) render();
  
  setTimeout(() => {
    if (recorder && recorder.state === 'recording') {
      playing = false;
      recorder.stop();
    }
  }, (TOTAL + 0.5) * 1000);
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});

preload(() => {
  render();
  console.log('✅ Video ready. Press SPACE to play.');
  document.getElementById('playBtn').textContent = '▶ 播放';
});
